{% extends 'base.html' %}
{% block title %}Notifications{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-bell"></i> Notifications</h2>
<div class="list-group shadow-sm">
    {% for n in notifications %}
    <a href="{% url 'accounts:notification_read' n.pk %}" class="list-group-item list-group-item-action {% if not n.lu %}list-group-item-primary{% endif %}">
        <div class="d-flex justify-content-between">
            <strong>{{ n.titre }}</strong>
            <small>{{ n.created_at|date:"d/m/Y H:i" }}</small>
        </div>
        <p class="mb-0 text-muted">{{ n.message }}</p>
    </a>
    {% empty %}
    <div class="list-group-item text-muted">Aucune notification</div>
    {% endfor %}
</div>
{% endblock %}
