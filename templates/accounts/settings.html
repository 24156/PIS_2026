{% extends 'base.html' %}
{% block title %}Paramètres{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-gear"></i> Paramètres</h2>
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Prénom</label><input type="text" name="first_name" class="form-control" value="{{ user.first_name }}"></div>
                <div class="col-md-6"><label class="form-label">Nom</label><input type="text" name="last_name" class="form-control" value="{{ user.last_name }}"></div>
                <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ user.email }}"></div>
                <div class="col-md-6"><label class="form-label">Téléphone</label><input type="text" name="phone" class="form-control" value="{{ user.phone }}"></div>
                <div class="col-md-6"><label class="form-label">Photo</label><input type="file" name="photo" class="form-control"></div>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Enregistrer</button>
        </form>
    </div>
</div>
{% endblock %}
