{% extends 'base.html' %}
{% block title %}Filières{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-4"><h2>Filières</h2><a href="{% url 'academics:filiere_create' %}" class="btn btn-primary">Ajouter</a></div>
<table class="table table-striped"><thead><tr><th>Code</th><th>Nom</th><th>Département</th><th>Actions</th></tr></thead><tbody>
{% for item in items %}<tr><td>{{ item.code }}</td><td>{{ item.nom }}</td><td>{{ item.departement }}</td><td>
<a href="{% url 'academics:filiere_edit' item.pk %}" class="btn btn-sm btn-outline-primary">Modifier</a>
<a href="{% url 'academics:filiere_delete' item.pk %}" class="btn btn-sm btn-outline-danger">Supprimer</a>
</td></tr>{% empty %}<tr><td colspan="4" class="text-muted">Aucune filière</td></tr>{% endfor %}
</tbody></table>
{% endblock %}
