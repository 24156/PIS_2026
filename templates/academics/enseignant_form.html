{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<h2 class="mb-4">{{ title }}</h2>
<div class="card shadow-sm"><div class="card-body">
<form method="post">{% csrf_token %}
{% if not edit %}<div class="mb-3"><label class="form-label">Utilisateur enseignant</label><select name="user" class="form-select" required>{% for t in teachers %}<option value="{{ t.pk }}">{{ t.get_full_name|default:t.username }}</option>{% endfor %}</select></div>{% endif %}
{% for field in form %}<div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>{% endfor %}
<button type="submit" class="btn btn-primary">Enregistrer</button>
</form></div></div>
{% endblock %}
