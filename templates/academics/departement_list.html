{% extends 'academics/faculte_list.html' %}
{% block title %}Départements{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-4"><h2>Départements</h2><a href="{% url 'academics:departement_create' %}" class="btn btn-primary">Ajouter</a></div>
<table class="table table-striped"><thead><tr><th>Code</th><th>Nom</th><th>Faculté</th><th>Actions</th></tr></thead><tbody>
{% for item in items %}<tr><td>{{ item.code }}</td><td>{{ item.nom }}</td><td>{{ item.faculte }}</td><td>
<a href="{% url 'academics:departement_edit' item.pk %}" class="btn btn-sm btn-outline-primary">Modifier</a>
</td></tr>{% empty %}<tr><td colspan="4" class="text-muted">Aucun département</td></tr>{% endfor %}
</tbody></table>
{% endblock %}
